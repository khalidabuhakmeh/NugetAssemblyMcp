name: Build and Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach artifacts to (e.g., 1.1.1)'
        required: true
        type: string

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: NuGetAssemblyMcp-win-x64.exe
          - os: ubuntu-latest
            rid: linux-x64
            artifact: NuGetAssemblyMcp-linux-x64
          - os: macos-latest
            rid: osx-x64
            artifact: NuGetAssemblyMcp-osx-x64
          - os: macos-latest
            rid: osx-arm64
            artifact: NuGetAssemblyMcp-osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: |
          dotnet publish src/NuGetAssemblyMcp/NuGetAssemblyMcp.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            -p:PublishSingleFile=true \
            -p:SelfContained=true \
            -p:EnableCompressionInSingleFile=true \
            -o ./publish

      - name: Rename artifact (Unix)
        if: runner.os != 'Windows'
        run: mv ./publish/NuGetAssemblyMcp ./publish/${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: mv ./publish/NuGetAssemblyMcp.exe ./publish/${{ matrix.artifact }}
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ./publish/${{ matrix.artifact }}

  attach-to-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Attach artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for dir in ./artifacts/*/; do
            for file in "$dir"*; do
              echo "Uploading $file"
              gh release upload "${{ steps.tag.outputs.tag }}" "$file" --repo ${{ github.repository }} --clobber
            done
          done
